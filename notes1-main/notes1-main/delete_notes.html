<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link href="styles.css" rel="stylesheet">
        <title>Удалить заметку</title>
    </head>
            <style>
        body {
            font-family: MS Serif;
            background: #FFF5EE;
            padding: 20px;
        }
        h1 { color: #333; }

        button {
            padding: 6px 10px;
            margin: 5px 0;
            cursor: pointer;
        }

        input, textarea {
            width: 300px;
            padding: 5px;
            margin: 5px 0;
        }

        .note {
            background: #FFFFFF;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .delete-btn {
            background: #FFFFFF;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
        <div class="wrapper">
            <div id="sidebar1" class="aside">
                <h2>Введите Id</h2>
                <input type="number" id="noteId" placeholder="Введите ID">
                    <button onclick="getNoteById()">Удалить</button>
</div>


<script>


async function getNoteById() {
    const id = document.getElementById("noteId").value;
    const res = await fetch(`${API}/notes/${id}`);

    if (res.status === 404) {
        alert("Заметка не найдена");
        return;
    }

    const data = await res.json();
    showResult([data]);
}
</script>
