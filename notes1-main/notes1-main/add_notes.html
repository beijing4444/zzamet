<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link href="styles.css" rel="stylesheet">
        <title>Добавить заметку</title>

                <style>
        body {
            font-family: MS Serif;
            background: #FFF5EE;
            padding: 20px;
        }
        h1 { color: #333; }

        button {
            padding: 6px 10px;
            margin: 5px 0;
            cursor: pointer;
        }

        input, textarea {
            width: 300px;
            padding: 5px;
            margin: 5px 0;
        }

        .note {
            background: #FFFFFF;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .delete-btn {
            background: #FFFFFF;
            color: white;
            border: none;
            border-radius: 4px;
        }
    </style>
    </head>
            <div id="sidebar2" class="aside">
                <h2>Добавить свою заметку</h2>
                    <input type="text" id="title" placeholder="Название"><br>
                    <textarea id="content" placeholder="Описание"></textarea><br>
                    <button onclick="addNote()">Добавить</button>
